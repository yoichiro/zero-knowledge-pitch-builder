name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Node 22 bundles npm 10, which fails `npm ci` on bundled optional deps (@emnapi); use npm 11 to match the lockfile generator.
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ZERO_KNOWLEDGE_PITCH_BUILDER }}
          channelId: live
          projectId: zero-knowledge-pitch-builder
